services:
  - type: web
    name: futbolink-backend
    env: node
    buildCommand: npm install && NODE_OPTIONS=--max-old-space-size=1024 npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
